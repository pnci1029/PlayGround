name: Deploy BE to Cafe24

on:
  push:
    branches: [ main ]
    paths: [ 'be/**' ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    # 🔑 .gitignore된 실제 파일들을 복원
    - name: Restore gitignored files
      run: |
        cd be
        
        # .env 파일 복원
        echo '${{ secrets.BE_ENV_FILE }}' | base64 -d > .env
        
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo '${{ secrets.SSH_PRIVATE_KEY }}' | base64 -d > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.CAFE24_HOST }} >> ~/.ssh/known_hosts
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: be/package-lock.json
        
    - name: Install and build
      run: |
        cd be
        npm ci
        npm run build
        
    # PM2 ecosystem 설정 파일 생성
    - name: Create PM2 config
      run: |
        cd be
        cat > ecosystem.config.js << 'EOF'
        module.exports = {
          apps: [{
            name: 'playground-api',
            script: 'dist/index.js',
            instances: 1,
            exec_mode: 'cluster',
            env_production: {
              NODE_ENV: 'production',
              PORT: 3000
            },
            log_file: '/home/${{ secrets.CAFE24_USER }}/logs/api.log',
            error_file: '/home/${{ secrets.CAFE24_USER }}/logs/api-error.log',
            out_file: '/home/${{ secrets.CAFE24_USER }}/logs/api-out.log'
          }]
        };
        EOF
        
    - name: Deploy to Cafe24
      run: |
        cd be
        
        # 배포 패키지 생성
        tar -czf deploy.tar.gz \
          dist/ \
          package*.json \
          .env \
          ecosystem.config.js \
          --exclude='*.map'
          
        # 서버에 배포 
        ssh -i ~/.ssh/id_rsa ${{ secrets.CAFE24_USER }}@${{ secrets.CAFE24_HOST }} \
          "cd ${{ secrets.CAFE24_PATH }} && \
           [ -d current ] && cp -r current backup-\$(date +%Y%m%d-%H%M%S) || true && \
           mkdir -p logs"
           
        scp -i ~/.ssh/id_rsa deploy.tar.gz ${{ secrets.CAFE24_USER }}@${{ secrets.CAFE24_HOST }}:${{ secrets.CAFE24_PATH }}/
        
        # 배포 및 재시작
        ssh -i ~/.ssh/id_rsa ${{ secrets.CAFE24_USER }}@${{ secrets.CAFE24_HOST }} \
          "cd ${{ secrets.CAFE24_PATH }} && \
           rm -rf temp && mkdir temp && \
           tar -xzf deploy.tar.gz -C temp && \
           
           pm2 stop playground-api 2>/dev/null || true && \
           rm -rf current && mv temp current && \
           cd current && \
           npm ci --production && \
           pm2 start ecosystem.config.js --env production && \
           pm2 save && \
           cd .. && rm deploy.tar.gz"