name: Deploy FE to Cafe24

on:
  push:
    branches: [ main ]
    paths: [ 'fe/**' ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    # 🔑 .gitignore된 실제 파일들을 복원
    - name: Restore gitignored files
      run: |
        cd fe
        
        # .env.local 복원
        echo '${{ secrets.FE_ENV_LOCAL_FILE }}' | base64 -d > .env.local
        
        # config.ts 복원 (있는 경우)
        if [ ! -z '${{ secrets.FE_CONFIG_FILE }}' ]; then
          echo '${{ secrets.FE_CONFIG_FILE }}' | base64 -d > src/lib/config.ts
        fi
        
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo '${{ secrets.SSH_PRIVATE_KEY }}' | base64 -d > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.CAFE24_HOST }} >> ~/.ssh/known_hosts
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: fe/package-lock.json
        
    - name: Install and build
      run: |
        cd fe
        npm ci
        npm run build
        
    - name: Deploy to Cafe24
      run: |
        cd fe
        
        # 빌드 결과물만 압축
        tar -czf deploy.tar.gz -C out . 2>/dev/null || tar -czf deploy.tar.gz -C .next/static . -C ../../out .
        
        # 백업 및 배포
        ssh -i ~/.ssh/id_rsa ${{ secrets.CAFE24_USER }}@${{ secrets.CAFE24_HOST }} \
          "cd ${{ secrets.CAFE24_PATH }} && [ -d current ] && cp -r current backup-\$(date +%Y%m%d-%H%M%S) || true"
          
        scp -i ~/.ssh/id_rsa deploy.tar.gz ${{ secrets.CAFE24_USER }}@${{ secrets.CAFE24_HOST }}:${{ secrets.CAFE24_PATH }}/
        
        ssh -i ~/.ssh/id_rsa ${{ secrets.CAFE24_USER }}@${{ secrets.CAFE24_HOST }} \
          "cd ${{ secrets.CAFE24_PATH }} && rm -rf temp && mkdir temp && \
           tar -xzf deploy.tar.gz -C temp && \
           rm -rf current && mv temp current && \
           rm deploy.tar.gz"