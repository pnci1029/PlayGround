services:
  # MoodBite 백엔드 서비스 (Spring Boot + Kotlin)
  moodbite:
    build:
      context: ./MoodBite_BE
      dockerfile: Dockerfile
    image: moodbite-backend:latest
    container_name: moodbite
    ports:
      - "8082:8082"  # HTTP API
      - "8084:8084"  # WebSocket
    env_file:
      - ../.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8082
      - WS_PORT=8084
      - SPRING.APPLICATION.PORT=8082
      - DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-playground}
      - DB_DRIVER=org.postgresql.Driver
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - DB_SCHEMA=moodbite
    restart: unless-stopped
    networks:
      - playground_network

networks:
  playground_network:
    external: true
    name: playground_playground_network