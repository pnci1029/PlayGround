<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="moodGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#45B7D1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="14" fill="url(#moodGradient)" />
  
  <!-- Fork and spoon -->
  <g transform="translate(16, 16) scale(0.8)">
    <!-- Fork -->
    <g transform="translate(-6, -8)">
      <path d="M0 0v12M-2 0v4M0 0v4M2 0v4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>
    
    <!-- Spoon -->
    <g transform="translate(6, -8)">
      <circle cx="0" cy="2" r="2" fill="white"/>
      <path d="M0 4v8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    
    <!-- Simple smile -->
    <path d="M-4 2q4 4 8 0" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>