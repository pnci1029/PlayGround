# Docker 배포환경 설정
spring:
  # H2 콘솔 비활성화
  h2:
    console:
      enabled: false
      
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/playground}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # 운영 스키마는 Hibernate 가 자동 변경하지 않는다(부팅 시 스키마 무작업).
      # 스키마 변경은 별도 마이그레이션으로만 수행한다.
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        show_sql: false
        default_schema: moodbite
        hbm2ddl:
          create_namespaces: true

# 로깅 레벨 조정 (운영 환경)
logging:
  level:
    com.example.pro.controller: info
    org.hibernate: warn
