name: Deploy PlayGround to Cafe24

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # рҹ”‘ .gitignoreлҗң мӢӨм ң нҢҢмқјл“Өмқ„ ліөмӣҗ
    - name: Restore gitignored files
      run: |
        # PlayGround BE .env ліөмӣҗ
        if [ ! -z '${{ secrets.PLAYGROUND_BE_ENV_FILE }}' ]; then
          echo '${{ secrets.PLAYGROUND_BE_ENV_FILE }}' | base64 -d > playground/be/.env
        fi
        
        # PlayGround FE .env.local ліөмӣҗ
        if [ ! -z '${{ secrets.PLAYGROUND_FE_ENV_LOCAL_FILE }}' ]; then
          echo '${{ secrets.PLAYGROUND_FE_ENV_LOCAL_FILE }}' | base64 -d > playground/fe/.env.local
        fi
        
        # кіөнҶө .env.production ліөмӣҗ (мөңмғҒмң„)
        if [ ! -z '${{ secrets.ENV_PRODUCTION_FILE }}' ]; then
          echo '${{ secrets.ENV_PRODUCTION_FILE }}' | base64 -d > .env.production
        fi
        
        # л§Ҳмқҙк·ёл Ҳмқҙм…ҳ нҢҢмқјл“Ө ліөмӣҗ
        mkdir -p migrations
        if [ ! -z '${{ secrets.MIGRATION_SERVICE_FILE }}' ]; then
          echo '${{ secrets.MIGRATION_SERVICE_FILE }}' | base64 -d > migrations/migration.service.ts
        fi
        if [ ! -z '${{ secrets.MIGRATION_PLAYGROUND_SQL }}' ]; then
          echo '${{ secrets.MIGRATION_PLAYGROUND_SQL }}' | base64 -d > migrations/playground.sql
        fi
        
        # PlayGround FE config.ts ліөмӣҗ
        if [ ! -z '${{ secrets.PLAYGROUND_FE_CONFIG_FILE }}' ]; then
          mkdir -p playground/fe/src/lib
          echo '${{ secrets.PLAYGROUND_FE_CONFIG_FILE }}' | base64 -d > playground/fe/src/lib/config.ts
        fi
        
        # л©”мқё .env ліөмӣҗ
        if [ ! -z '${{ secrets.MAIN_ENV_FILE }}' ]; then
          echo '${{ secrets.MAIN_ENV_FILE }}' | base64 -d > .env
        fi

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo '${{ secrets.SSH_PRIVATE_KEY }}' | base64 -d > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.CAFE24_HOST }} >> ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts

    - name: Package source code
      run: |
        # мҶҢмҠӨмҪ”л“ңл§Ң м••м¶• (м„ңлІ„м—җм„ң Dockerк°Җ л№Ңл“ң)
        tar --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.next' \
            --exclude='build' \
            --exclude='*.map' \
            --exclude='*.git*' \
            --exclude='.npm' \
            --exclude='.cache' \
            -czf playground-deploy.tar.gz \
            playground/ \
            blog/ \
            moodbite/ \
            trend/ \
            migrations/ \
            docker-compose.yml \
            docker-compose.playground.yml \
            docker-compose.moodbite.yml \
            docker-compose.trend.yml \
            docker-compose.blog.yml \
            nginx/ \
            caddy/ \
            $([ -d database ] && echo database/ || echo)

    - name: Deploy to Cafe24
      run: |
        # л°°нҸ¬ нҢҢмқј м—…лЎңл“ң
        scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa playground-deploy.tar.gz \
          ${{ secrets.CAFE24_USER }}@${{ secrets.CAFE24_HOST }}:${{ secrets.CAFE24_PATH }}/
        
        # м„ңлІ„м—җм„ң мҶҢмҠӨ л°°нҸ¬ (Docker мӢӨн–үмқҖ мҲҳлҸҷ)
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa ${{ secrets.CAFE24_USER }}@${{ secrets.CAFE24_HOST }} \
          "cd ${{ secrets.CAFE24_PATH }} && \
           
           # кё°мЎҙ м„ңл№„мҠӨ м •м§Җ
           # docker-compose down 2>/dev/null || true && \
           docker-compose -f playground/docker-compose.playground.yml down 2>/dev/null || true && \
           
           # мғҲ лІ„м „ мҶҢмҠӨ л°°нҸ¬
           rm -rf playground-temp && mkdir playground-temp && \
           tar -xzf playground-deploy.tar.gz -C playground-temp && \
           rm -rf playground && mv playground-temp playground && \
           
           # Docker ComposeлЎң м„ңл№„мҠӨ мӢңмһ‘
           docker-compose -f playground/docker-compose.playground.yml up -d --build && \
           
           # н—¬мҠӨмІҙнҒ¬ лҢҖкё° (30мҙҲ)
           sleep 30 && \
           
           # м •лҰ¬
           rm -f playground-deploy.tar.gz && \
           
           echo 'вң… PlayGround л°°нҸ¬ мҷ„лЈҢ'"

    # Health check
    - name: Health check
      run: |
        sleep 15
        
        # м„ңл№„мҠӨ н—¬мҠӨмІҙнҒ¬
        if curl -f http://${{ secrets.CAFE24_HOST }}:3000/ 2>/dev/null; then
          echo "вң… PlayGround м„ңл№„мҠӨ м •мғҒ лҸҷмһ‘"
        else
          echo "вқҢ PlayGround м„ңл№„мҠӨ н—¬мҠӨмІҙнҒ¬ мӢӨнҢЁ"
          
          # лЎңк·ё нҷ•мқё
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa ${{ secrets.CAFE24_USER }}@${{ secrets.CAFE24_HOST }} \
            "docker-compose -f ${{ secrets.CAFE24_PATH }}/playground/docker-compose.playground.yml logs --tail=20"
          
          exit 1
        fi
