name: Deploy PlayGround to Contabo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 🔑 .gitignore된 실제 파일들을 복원
    - name: Restore gitignored files
      run: |
        # PlayGround BE .env 복원
        if [ ! -z '${{ secrets.PLAYGROUND_BE_ENV_FILE }}' ]; then
          echo '${{ secrets.PLAYGROUND_BE_ENV_FILE }}' | base64 -d > playground/be/.env
        fi
        
        # PlayGround FE .env.local 복원
        if [ ! -z '${{ secrets.PLAYGROUND_FE_ENV_LOCAL_FILE }}' ]; then
          echo '${{ secrets.PLAYGROUND_FE_ENV_LOCAL_FILE }}' | base64 -d > playground/fe/.env.local
        fi
        
        # PlayGround FE .env.production 복원
        if [ ! -z '${{ secrets.PLAYGROUND_FE_ENV_PROD_FILE }}' ]; then
          echo '${{ secrets.PLAYGROUND_FE_ENV_PROD_FILE }}' | base64 -d > playground/fe/.env.production
        fi
        
        # 공통 .env.production 복원 (최상위)
        if [ ! -z '${{ secrets.ENV_PRODUCTION_FILE }}' ]; then
          echo '${{ secrets.ENV_PRODUCTION_FILE }}' | base64 -d > .env.production
        fi
        
        # 마이그레이션 파일들 복원
        mkdir -p migrations
        if [ ! -z '${{ secrets.MIGRATION_SERVICE_FILE }}' ]; then
          echo '${{ secrets.MIGRATION_SERVICE_FILE }}' | base64 -d > migrations/migration.service.ts
        fi
        if [ ! -z '${{ secrets.MIGRATION_PLAYGROUND_SQL }}' ]; then
          echo '${{ secrets.MIGRATION_PLAYGROUND_SQL }}' | base64 -d > migrations/playground.sql
        fi
        
        # PlayGround FE config.ts 복원
        if [ ! -z '${{ secrets.PLAYGROUND_FE_CONFIG_FILE }}' ]; then
          mkdir -p playground/fe/src/lib
          echo '${{ secrets.PLAYGROUND_FE_CONFIG_FILE }}' | base64 -d > playground/fe/src/lib/config.ts
        fi
        
        # 메인 .env 복원
        if [ ! -z '${{ secrets.MAIN_ENV_FILE }}' ]; then
          echo '${{ secrets.MAIN_ENV_FILE }}' | base64 -d > .env
        fi
        
        # MoodBite BE secret 복원
        if [ ! -z '${{ secrets.MOODBITE_BE_SECRET_FILE }}' ]; then
          mkdir -p moodbite/MoodBite_BE/src/main/resources
          echo '${{ secrets.MOODBITE_BE_SECRET_FILE }}' | base64 -d > moodbite/MoodBite_BE/src/main/resources/application-secret.yml
        fi
        
        # MoodBite foods.json data 복원 (압축됨)
        if [ ! -z '${{ secrets.MOODBITE_FOODS_JSON_FILE }}' ]; then
          mkdir -p moodbite/MoodBite_BE/src/main/resources/data
          echo '${{ secrets.MOODBITE_FOODS_JSON_FILE }}' | base64 -d | gunzip > moodbite/MoodBite_BE/src/main/resources/data/foods.json
        fi

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo '${{ secrets.SSH_PRIVATE_KEY }}' | base64 -d > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.CONTABO_HOST }} >> ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts

    - name: Package source code
      run: |
        # 백엔드 관련 파일들만 압축 (서버에서 Docker가 빌드)
        tar --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.next' \
            --exclude='build' \
            --exclude='*.map' \
            --exclude='*.git*' \
            --exclude='.npm' \
            --exclude='.cache' \
            --exclude='playground/fe' \
            --exclude='moodbite/MoodBite_FE' \
            --exclude='trend/trend_fe' \
            --exclude='blog/blog_fe' \
            -czf playground-deploy.tar.gz \
            playground/be/ \
            moodbite/MoodBite_BE/ \
            trend/trend_be/ \
            migrations/ \
            docker-compose.yml \
            caddy/ \
            .env \
            .env.production \
            $([ -d database ] && echo database/ || echo)

    - name: Detect service changes
      id: changes
      run: |
        echo "Detecting changes..."
        
        # HEAD~1이 존재하는지 확인
        if git rev-parse HEAD~1 >/dev/null 2>&1; then
          echo "Using git diff with HEAD~1"
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
        else
          echo "HEAD~1 not found, using all files in current commit"
          CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD)
        fi
        
        echo "Changed files:"
        echo "$CHANGED_FILES"
        
        # 백엔드 서비스별 변경 여부 확인
        echo "playground_backend=$(echo '$CHANGED_FILES' | grep -q '^playground/be/' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
        echo "moodbite_backend=$(echo '$CHANGED_FILES' | grep -q '^moodbite/MoodBite_BE/' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
        echo "trend_backend=$(echo '$CHANGED_FILES' | grep -q '^trend/trend_be/' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
        echo "blog_backend=$(echo '$CHANGED_FILES' | grep -q '^blog/' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
        echo "caddy_config=$(echo '$CHANGED_FILES' | grep -q '^caddy/' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
        echo "docker_config=$(echo '$CHANGED_FILES' | grep -q '^docker-compose' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
        
        # 변경사항 출력
        echo "playground_backend=$(echo '$CHANGED_FILES' | grep -q '^playground/be/' && echo 'true' || echo 'false')"
        echo "moodbite_backend=$(echo '$CHANGED_FILES' | grep -q '^moodbite/MoodBite_BE/' && echo 'true' || echo 'false')"
        echo "trend_backend=$(echo '$CHANGED_FILES' | grep -q '^trend/trend_be/' && echo 'true' || echo 'false')"
        echo "blog_backend=$(echo '$CHANGED_FILES' | grep -q '^blog/' && echo 'true' || echo 'false')"

    - name: Deploy to Contabo
      run: |
        # 디렉토리 생성 후 배포 파일 업로드
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa ${{ secrets.CONTABO_USER }}@${{ secrets.CONTABO_HOST }} \
          "mkdir -p ${{ secrets.CONTABO_PATH }}"
        
        scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa playground-deploy.tar.gz \
          ${{ secrets.CONTABO_USER }}@${{ secrets.CONTABO_HOST }}:${{ secrets.CONTABO_PATH }}/
        
        # 서버에서 소스 배포
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa ${{ secrets.CONTABO_USER }}@${{ secrets.CONTABO_HOST }} \
          "cd ${{ secrets.CONTABO_PATH }} && \
           rm -rf playground-temp && \
           mkdir playground-temp && \
           tar -xzf playground-deploy.tar.gz -C playground-temp && \
           rm -rf playground && \
           mv playground-temp playground && \
           rm -f playground-deploy.tar.gz && \
           echo '✅ PlayGround 소스 배포 완료'"

    - name: Restart changed backend services
      run: |
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa ${{ secrets.CONTABO_USER }}@${{ secrets.CONTABO_HOST }} \
          "cd ${{ secrets.CONTABO_PATH }}/playground && \
           
           # 변경된 백엔드 서비스만 재시작
           if [ '${{ steps.changes.outputs.playground_backend }}' = 'true' ]; then
             echo '🔄 PlayGround Backend 재시작 중...'
             docker compose up -d --build backend
           fi
           
           if [ '${{ steps.changes.outputs.moodbite_backend }}' = 'true' ]; then
             echo '🔄 MoodBite Backend 재시작 중...'
             docker compose up -d --build moodbite
           fi
           
           if [ '${{ steps.changes.outputs.trend_backend }}' = 'true' ]; then
             echo '🔄 Trend Backend 재시작 중...'
             docker compose up -d --build trend
           fi
           
           if [ '${{ steps.changes.outputs.blog_backend }}' = 'true' ]; then
             echo '🔄 Blog Backend 재시작 중...'
             docker compose -f docker-compose.blog.yml up -d --build blog-backend
           fi
           
           if [ '${{ steps.changes.outputs.caddy_config }}' = 'true' ]; then
             echo '🔄 Caddy 재시작 중...'
             docker compose restart caddy
           fi
           
           if [ '${{ steps.changes.outputs.docker_config }}' = 'true' ]; then
             echo '🔄 전체 백엔드 서비스 재시작 중...'
             docker compose up -d --build
           fi
           
           echo '✅ 변경된 백엔드 서비스 재시작 완료'"

