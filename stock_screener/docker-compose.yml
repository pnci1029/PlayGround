services:
  # Stock Screener 서비스 (FastAPI + Python)
  stock_screener:
    build:
      context: .
      dockerfile: Dockerfile
    image: stock-screener:latest
    container_name: stock_screener
    ports:
      - "8005:8005"  # HTTP API
    env_file:
      - /root/playground/.env
    environment:
      - NODE_ENV=production
      - PORT=8005
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=playground
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_SCHEMA=stocks
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - playground_network

networks:
  playground_network:
    external: true
    name: playground_playground_network