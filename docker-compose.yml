services:
  # PostgreSQL ŽćįžĚīŪĄįŽ≤†žĚīžä§
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-playground}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - playground_network

  # ŽįĪžóĒŽďú žĄúŽĻĄžä§ (Node.js)
  backend:
    build:
      context: .
      dockerfile: ./playground/be/Dockerfile
    image: playground-backend:latest
    container_name: playground
    ports:
      - "8000:8000"   # HTTP API
      - "8010:8010"   # WebSocket
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-playground}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=24h
      - PORT=8000
      - WS_PORT=8010
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - playground_network

  # MoodBite ŽįĪžóĒŽďú žĄúŽĻĄžä§ (Spring Boot + Kotlin)
  moodbite:
    build:
      context: ./moodbite/MoodBite_BE
      dockerfile: Dockerfile
    image: moodbite-backend:latest
    container_name: moodbite
    ports:
      - "8082:8082"  # HTTP API
      - "8084:8084"  # WebSocket
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8082
      - WS_PORT=8084
      - SPRING.APPLICATION.PORT=8082
      - DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-playground}
      - DB_DRIVER=org.postgresql.Driver
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - DB_SCHEMA=moodbite
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - playground_network

  # Trend ŽįĪžóĒŽďú žĄúŽĻĄžä§ (Node.js + TypeScript)
  trend:
    build:
      context: .
      dockerfile: ./trend/trend_be/Dockerfile
    image: trend-backend:latest
    container_name: trend
    ports:
      - "8002:8002"  # HTTP API
      - "8012:8012"  # WebSocket
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8002
      - WS_PORT=8012
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-playground}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_SCHEMA=trend
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - playground_network

  # Blog ŽįĪžóĒŽďú žĄúŽĻĄžä§ (Node.js + TypeScript + Fastify)
  blog:
    build:
      context: .
      dockerfile: ./blog/blog_be/Dockerfile
    image: blog-backend:latest
    container_name: blog
    ports:
      - "8003:8003"  # HTTP API
      - "8013:8013"  # WebSocket
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8003
      - WS_PORT=8013
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-playground}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_SCHEMA=blog
      - BLOG_ADMIN_USERNAME=${BLOG_ADMIN_USERNAME}
      - BLOG_ADMIN_PASSWORD=${BLOG_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - playground_network

  # Caddy Ž¶¨Ž≤Ąžä§ ŪĒĄŽ°Ěžčú
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - /salehero/nginx/html:/usr/share/nginx/html:ro
      - ./404-page:/usr/share/caddy/404:ro
    networks:
      - playground_network
      - salehero_network

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  playground_network:
    driver: bridge
  salehero_network:
    external: true
    name: app_salehero-network
