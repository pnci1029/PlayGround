services:
  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-playground}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vheh1177}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - playground_network

  # 백엔드 서비스 (Node.js)
  backend:
    build:
      context: .
      dockerfile: ./playground/be/Dockerfile
    image: playground-backend:latest
    container_name: playground
    ports:
      - "8000:8000"   # HTTP API
      - "8010:8010"   # WebSocket
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-playground}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-vheh1177}
      - JWT_SECRET=${JWT_SECRET:-please_change_this_jwt_secret_in_production}
      - JWT_EXPIRES_IN=24h
      - PORT=8000
      - WS_PORT=8010
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - playground_network

  # MoodBite 백엔드 서비스 (Spring Boot + Kotlin)
  moodbite:
    build:
      context: ./moodbite/MoodBite_BE
      dockerfile: Dockerfile
    image: moodbite-backend:latest
    container_name: moodbite
    ports:
      - "8082:8082"  # HTTP API
      - "8084:8084"  # WebSocket
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8082
      - WS_PORT=8084
      - SPRING.APPLICATION.PORT=8082
      - DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-playground}
      - DB_DRIVER=org.postgresql.Driver
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-vheh1177}
      - DB_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - DB_SCHEMA=moodbite
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - playground_network

  # Trend 백엔드 서비스 (Node.js + TypeScript)
  trend:
    build:
      context: .
      dockerfile: ./trend/trend_be/Dockerfile
    image: trend-backend:latest
    container_name: trend
    ports:
      - "8002:8002"  # HTTP API
      - "8012:8012"  # WebSocket
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8002
      - WS_PORT=8012
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-playground}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-vheh1177}
      - DB_SCHEMA=trend
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - playground_network

  # Caddy 리버스 프록시
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - /salehero/nginx/html:/usr/share/nginx/html:ro
    networks:
      - playground_network

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  playground_network:
    driver: bridge
