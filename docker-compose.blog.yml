services:
  # PostgreSQL 데이터베이스 (공유)
  postgres:
    image: postgres:15-alpine
    container_name: playground_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-playground}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - playground_network

  # Blog 백엔드 서비스 (Node.js + TypeScript)
  blog-backend:
    build:
      context: ./blog/blog_be
      dockerfile: Dockerfile
    image: blog-backend:latest
    container_name: blog_backend
    ports:
      - "8003:8003"  # HTTP API
      - "8013:8013"  # WebSocket
    environment:
      - NODE_ENV=development
      - PORT=8003
      - WS_PORT=8013
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-playground}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-password}
      - DATABASE_URL=postgresql://postgres:vheh1177@postgres:5432/playground
      - BLOG_ADMIN_PASSWORD=myblog2025
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - playground_network

  # Blog 프론트엔드 서비스 (Next.js)
  blog-frontend:
    build:
      context: ./blog/blog_fe
      dockerfile: Dockerfile
    image: blog-frontend:latest
    container_name: blog_frontend
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:8013
      - BACKEND_CONTAINER_URL=http://blog_backend:8003
      - BACKEND_API_PREFIX=/api
      - BLOG_ADMIN_PASSWORD=myblog2025
      - NEXT_PUBLIC_BLOG_TITLE=개발자 블로그
    depends_on:
      - blog-backend
    restart: unless-stopped
    networks:
      - playground_network

volumes:
  postgres_data:

networks:
  playground_network:
    driver: bridge