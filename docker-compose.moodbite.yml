services:
  # PostgreSQL 데이터베이스 (공유)
  postgres:
    image: postgres:15-alpine
    container_name: playground_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-playground}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    ports:
      - "127.0.0.1:5432:5432"   # 외부 비공개 — 호스트 로컬/SSH 터널만
    restart: unless-stopped
    networks:
      - playground_network

  # MoodBite 백엔드 서비스 (Spring Boot + Kotlin)
  moodbite:
    build:
      context: ./moodbite/MoodBite_BE
      dockerfile: Dockerfile
    image: moodbite-backend:latest
    container_name: moodbite
    ports:
      - "8082:8082"  # HTTP API
      - "8084:8084"  # WebSocket
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8082
      - WS_PORT=8084
      - SPRING.APPLICATION.PORT=8082
      - DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-playground}
      - DB_DRIVER=org.postgresql.Driver
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - DB_SCHEMA=moodbite
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - playground_network

  # MoodBite 프론트엔드 서비스 (React)
  moodbite-frontend:
    build:
      context: ./moodbite/MoodBite_FE
      dockerfile: Dockerfile
    image: moodbite-frontend:latest
    container_name: moodbite_frontend
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    # 참고: Vite 번들의 API URL은 빌드 시점에 주입된다. 로컬 통합환경에서 값을 바꾸려면
    # 위 build 섹션에 args(VITE_API_URL)를 추가해야 한다. (runtime env 는 정적 번들에 반영되지 않음)
    depends_on:
      - moodbite-backend
    restart: unless-stopped
    networks:
      - playground_network

volumes:
  postgres_data:

networks:
  playground_network:
    driver: bridge
