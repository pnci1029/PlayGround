services:
  # PostgreSQL 데이터베이스 (공유)
  postgres:
    image: postgres:15-alpine
    container_name: playground_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-playground}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - playground_network

  # Trend 백엔드 서비스 (Node.js + TypeScript)
  trend:
    build:
      context: ./trend/trend_be
      dockerfile: Dockerfile
    image: trend-backend:latest
    container_name: trend
    ports:
      - "8002:8002"  # HTTP API
      - "8012:8012"  # WebSocket
    environment:
      - NODE_ENV=development
      - PORT=8002
      - WS_PORT=8012
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-playground}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-password}
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - playground_network

  # Trend 프론트엔드 서비스 (Next.js)
  trend-frontend:
    build:
      context: ./trend/trend_fe
      dockerfile: Dockerfile
    image: trend-frontend:latest
    container_name: trend_frontend
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:8012
      - BACKEND_CONTAINER_URL=http://trend:8002
      - BACKEND_API_PREFIX=/api
    depends_on:
      - trend
    restart: unless-stopped
    networks:
      - playground_network

volumes:
  postgres_data:

networks:
  playground_network:
    driver: bridge